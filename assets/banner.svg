<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#090d16" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>

    <!-- Neon Glows -->
    <radialGradient id="glow-cyan" cx="10%" cy="10%" r="40%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow-emerald" cx="90%" cy="90%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow-red" cx="50%" cy="40%" r="30%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0" />
    </radialGradient>

    <!-- Dot Grid Pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#334155" opacity="0.3" />
    </pattern>

    <!-- Drop Shadows -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="15" stdDeviation="20" flood-color="#000000" flood-opacity="0.6" />
    </filter>
    <filter id="glow-text" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="900" height="500" fill="url(#bg-grad)" rx="16" />
  
  <!-- Glowing Spheres -->
  <rect width="900" height="500" fill="url(#glow-cyan)" rx="16" />
  <rect width="900" height="500" fill="url(#glow-emerald)" rx="16" />
  <rect width="900" height="500" fill="url(#glow-red)" rx="16" />

  <!-- Grid Overlay -->
  <rect width="900" height="500" fill="url(#grid)" rx="16" />

  <!-- Decorative Border -->
  <rect x="2" y="2" width="896" height="496" rx="14" fill="none" stroke="#334155" stroke-width="1.5" opacity="0.6" />

  <!-- TOP HUD: System Name and Badges -->
  <g transform="translate(40, 45)">
    <!-- Shield Logo -->
    <path d="M 0 0 L 14 -7 L 28 0 L 28 14 C 28 22 19 28 14 31 C 9 28 0 22 0 14 Z" fill="none" stroke="#38bdf8" stroke-width="2.5" filter="url(#glow-text)" />
    <!-- Letter H inside Shield -->
    <path d="M 9 7 L 9 17 M 19 7 L 19 17 M 9 12 L 19 12" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round" />
    
    <!-- Title -->
    <text x="45" y="17" font-family="'Outfit', 'Inter', 'Segoe UI', sans-serif" font-size="20" font-weight="800" fill="#f8fafc" letter-spacing="1.5">HALO ACCESS SYSTEM</text>
    <text x="45" y="30" font-family="'Inter', sans-serif" font-size="10" font-weight="600" fill="#64748b" letter-spacing="2">CYBER ACCESS ENGINE • C++17</text>

    <!-- Speed Indicator -->
    <g transform="translate(680, 2)">
      <rect x="0" y="0" width="140" height="26" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1" />
      <circle cx="15" cy="13" r="4" fill="#10b981" />
      <text x="27" y="17" font-family="'Fira Code', 'Consolas', monospace" font-size="10" font-weight="700" fill="#10b981">MEM SAFE: 0 LEAK</text>
    </g>
  </g>

  <!-- MAIN TERMINAL WINDOW -->
  <g transform="translate(40, 100)" filter="url(#shadow)">
    <!-- Terminal Shell -->
    <rect width="820" height="350" rx="10" fill="#0b0f19" stroke="#1e293b" stroke-width="2" />
    <rect width="820" height="350" rx="10" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.15" />

    <!-- Terminal Header (macOS style) -->
    <path d="M 0 10 A 10 10 0 0 1 10 0 L 810 0 A 10 10 0 0 1 820 10 L 820 35 L 0 35 Z" fill="#111827" stroke="#1e293b" stroke-width="1" />
    
    <!-- Window Control Buttons -->
    <circle cx="20" cy="18" r="6" fill="#ef4444" />
    <circle cx="40" cy="18" r="6" fill="#eab308" />
    <circle cx="60" cy="18" r="6" fill="#22c55e" />

    <!-- Terminal Tab Title -->
    <text x="410" y="22" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#94a3b8" text-anchor="middle">halo@cyber-access-engine:~/cli</text>

    <!-- Terminal Output -->
    <g transform="translate(25, 60)" font-family="'Fira Code', 'Consolas', 'Courier New', monospace" font-size="12.5" font-weight="500">
      
      <!-- Welcome Banner -->
      <text x="0" y="10" fill="#facc15" font-weight="bold">=== Halo Cyber Access Engine (v1.0.0-Stable) ===</text>
      <text x="0" y="28" fill="#64748b">Type 'help' for a list of available CLI commands.</text>

      <!-- Step 1: Load CSV -->
      <g transform="translate(0, 55)">
        <text x="0" y="0" fill="#38bdf8" font-weight="bold">halo&gt; </text>
        <text x="45" y="0" fill="#f8fafc">load data/cyber_activity_1m.csv</text>
        <text x="0" y="18" fill="#10b981">  [SUCCESS] 1,024,582 records loaded in 1.45 seconds</text>
        <text x="0" y="34" fill="#10b981">  [INDEX]   HashTable &amp; SortedIndex built: 0 memory leak</text>
      </g>

      <!-- Step 2: Running Anomaly Detection -->
      <g transform="translate(0, 125)">
        <text x="0" y="0" fill="#38bdf8" font-weight="bold">halo&gt; </text>
        <text x="45" y="0" fill="#f8fafc">detect anomaly --type=all</text>
        
        <!-- Anomaly 1 -->
        <rect x="0" y="12" width="770" height="24" rx="4" fill="#ef4444" fill-opacity="0.1" stroke="#ef4444" stroke-opacity="0.2" />
        <text x="10" y="28" fill="#fca5a5" font-weight="bold">[CRITICAL]</text>
        <text x="90" y="28" fill="#fca5a5">A05: Impossible Travel | User: U284 | Details: CN &gt; US (120m travel window)</text>

        <!-- Anomaly 2 -->
        <rect x="0" y="42" width="770" height="24" rx="4" fill="#f97316" fill-opacity="0.1" stroke="#f97316" stroke-opacity="0.2" />
        <text x="10" y="58" fill="#fdba74" font-weight="bold">[HIGH]    </text>
        <text x="90" y="58" fill="#fdba74">A03: Resource Flood   | Device: D109 | Details: Accessed 28 resources in 15m</text>

        <!-- Anomaly 3 -->
        <rect x="0" y="72" width="770" height="24" rx="4" fill="#facc15" fill-opacity="0.1" stroke="#facc15" stroke-opacity="0.2" />
        <text x="10" y="88" fill="#fef08a" font-weight="bold">[WARNING] </text>
        <text x="90" y="88" fill="#fef08a">A09: Dangerous Seq    | User: U007 | Details: ADMIN_ACTION &gt; DOWNLOAD (3m gap)</text>

        <!-- Anomaly 4 -->
        <rect x="0" y="102" width="770" height="24" rx="4" fill="#38bdf8" fill-opacity="0.1" stroke="#38bdf8" stroke-opacity="0.2" />
        <text x="10" y="118" fill="#bae6fd" font-weight="bold">[INFO]    </text>
        <text x="90" y="118" fill="#bae6fd">Anomaly scan completed. Found 3 critical security violations in 4.12s.</text>
      </g>

      <!-- Cursor -->
      <g transform="translate(0, 265)">
        <text x="0" y="0" fill="#38bdf8" font-weight="bold">halo&gt; </text>
        <rect x="45" y="-11" width="8" height="14" fill="#38bdf8" filter="url(#glow-text)">
          <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
        </rect>
      </g>
      
    </g>
  </g>

  <!-- BOTTOM STATUS HUD -->
  <g transform="translate(40, 475)" font-family="'Inter', sans-serif" font-size="10.5" font-weight="600">
    <!-- Active Status -->
    <circle cx="5" cy="-4" r="3.5" fill="#10b981" />
    <text x="15" y="0" fill="#94a3b8">ENGINE STATE: IDLE</text>
    
    <!-- Technology Tags -->
    <g transform="translate(510, 0)" fill="#64748b">
      <text x="0" y="0" text-anchor="end">ALGORITHMS: CUSTOM POLY-HASH • MERGE SORT • BINARY SEARCH</text>
    </g>
  </g>
</svg>
